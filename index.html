<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visszajelzés</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0E0F11;
      --surface: #16181C;
      --ink: #ECEEF2;
      --ink-muted: #6B7180;
      --accent: #4ADE80;
      --accent-dark: #166534;
      --accent-light: #052e16;
      --border: #2A2D34;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 40px rgba(0,0,0,0.4);
    }

    .header {
      margin-bottom: 2rem;
    }

    .label-chip {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--ink-muted);
      line-height: 1.6;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #3A3F4A;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
      background: #1C1F25;
    }

    .field textarea {
      height: 130px;
      line-height: 1.6;
    }

    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #052e16;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.25rem;
    }

    button[type="submit"]:hover { background: #86efac; }
    button[type="submit"]:active { transform: scale(0.98); }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 1.25rem;
    }

    /* Success state */
    .success-msg {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }
    .success-icon {
      width: 48px; height: 48px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 22px;
    }
    .success-msg h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .success-msg p {
      font-size: 14px;
      color: var(--ink-muted);
    }
  </style>
</head>
<body>
<div class="card">
  <div id="form-area">
    <div class="header">
      <span class="label-chip">Feedback</span>
      <h1>Uzsgyi</h1>
    </div>

    <form id="feedback-form" action="https://formspree.io/f/xaqaebnk" method="POST">
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" placeholder="kecske@mail.com" required />
      </div>
      <div class="field">
        <label for="message">Feedback</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit">Küldés</button>
    </form>

    <p class="footer-note">Az adataidat bizalmasan kezeljük.</p>
  </div>

  <div class="success-msg" id="success">
    <div class="success-icon">✓</div>
    <h2>Köszönjük!</h2>
    <p>Megkaptuk visszajelzésedet.<br>Hamarosan válaszolunk.</p>
  </div>
</div>

<script>
  const form = document.getElementById('feedback-form');
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = form.querySelector('button');
    btn.textContent = 'Küldés...';
    btn.disabled = true;
    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } else {
        btn.textContent = 'Hiba történt, próbáld újra';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = 'Hiba történt, próbáld újra';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
